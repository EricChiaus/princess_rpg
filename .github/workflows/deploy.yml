name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build

    - name: Copy built files to root
      run: |
        cp dist/assets/index.js index.js
        cp dist/assets/index.css index.css

    - name: Update index.html for GitHub Pages
      run: |
        sed -i 's|href="/dist/assets/index.css"|href="index.css"|g' index.html
        sed -i 's|src="/dist/assets/index.js"|src="index.js"|g' index.html

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      if: github.ref == 'refs/heads/master'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: .
